name: CI
permissions:
  contents: read
  pull-requests: write
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build:
    name: Build and test (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 26
          - 24
          - 22
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - if: ${{ matrix.node-version == 26 }}
        name: Check formatting
        run: npm run lint
      - if: ${{ matrix.node-version == 26 }}
        name: Check types
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm run test
      - if: ${{ matrix.node-version == 26 }}
        name: Check for packaging errors
        uses: kirkeaton/action-publint@790d324d5d1373c0409b5498776ab0010ca18355 # v2.0.19
      - if: ${{ matrix.node-version == 26 }}
        name: Check dependency owners
        uses: dependency-owners/check@2584b8e3cf695bc1380a7e5d12feac177f6c0385 # v2.0.16
        with:
          dependency-file: 'package.json'
          loader: './dist/index.js'
      - if: ${{ matrix.node-version == 26 }}
        name: Assign reviewers to dependency changes
        uses: dependency-owners/assign@6ba3e38ef6121366298e558fbdcb5e180e821ad2 # v2.0.23
        with:
          dependency-file: 'package.json'
          loader: './dist/index.js'
